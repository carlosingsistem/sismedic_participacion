{% extends 'base.html' %}
{% block title %} EDIT | MEDIC {% endblock %}


{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Actualizar Medico</h2>
    </div>
    <div class="card-body">
        <form action="{{url_for('medico.edit_medic', id_medico=medico.id_medico)}}" method="post">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" name="nombre" value="{{ medico.nombre }}" required>
            </div>
            <div class="mb-3">
                <label for="especialidad" class="form-label">Especialidad</label>
                <input type="text" class="form-control" id="especialidad" name="especialidad" value="{{ medico.especialidad }}" required>
            </div>
            <div class="mb-3">
                <label for="telefono" class="form-label">Telefono</label>
                <input type="text" class="form-control" id="telefono" name="telefono" value="{{ medico.telefono}}" required>
            </div>
            <div class="mb-3">
                <label for="correo" class="form-label">Correo</label>
                <input type="email" class="form-control" id="correo" name="correo" value="{{ medico.correo }}" required>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
