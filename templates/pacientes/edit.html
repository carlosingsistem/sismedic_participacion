{% extends 'base.html' %}
{% block title %} EDIT | PATIENT {% endblock %}


{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Actualizar Paciente</h2>
    </div>
    <div class="card-body">
        <form action="{{url_for('paciente.edit_patient', id_patient=paciente.id_paciente)}}" method="post">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" name="nombre" value="{{ paciente.nombre }}" required>
            </div>
            <div class="mb-3">
                <label for="edad" class="form-label">Edad</label>
                <input type="number" class="form-control" id="edad" name="edad" value="{{ paciente.edad }}" required>
            </div>
            <div class="mb-3">
                <label for="direccion" class="form-label">Direccion</label>
                <input type="text" class="form-control" id="direccion" name="direccion" value="{{ paciente.direccion }}" required>
            </div>
            <div class="mb-3">
                <label for="telefono" class="form-label">Telefono</label>
                <input type="number" class="form-control" id="telefono" name="telefono" value="{{ paciente.telefono}}" required>
            </div>

            <button type="submit" class="btn btn-primary">Actulizar</button>
        </form>
    </div>
</div>
{% endblock %}
